name: wheel

on:
  push:
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

env:
  # https://github.com/actions/checkout/issues/1809
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  source:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: mamba-org/setup-micromamba@v1
      with:
        environment-file: assets/ci/build-env.yaml
    - name: Install LAPACK
      run: |
        sudo apt-get update
        sudo apt-get install -y liblapack-dev
    - run: |
        meson setup _build
        meson dist -C _build --no-tests --include-subprojects
        mv _build/meson-dist/*.tar.xz .
    - uses: actions/upload-artifact@v4
      with:
        name: tblite-source
        path: ./*.tar.xz
        retention-days: 5

  sdist:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: mamba-org/setup-micromamba@v1
      with:
        environment-file: assets/ci/python-env.yaml
        create-args: >-
          meson-python
          python-build
    - name: Install LAPACK
      run: |
        sudo apt-get update
        sudo apt-get install -y liblapack-dev
    - name: Reorganize repository
      run: |
        git config user.email ""
        git config user.name "dummy"
        git subtree add --prefix python/subprojects/tblite . HEAD
    - run: |
        python -m build python/ --sdist --outdir . -n -Cdist-args="--include-subprojects"
    - uses: actions/upload-artifact@v4
      with:
        name: tblite-python-sdist
        path: ./*.tar.gz
        retention-days: 5

  wheels:
    needs:
      - sdist
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - macos-15-intel
          # windows-latest

    defaults:
      run:
        shell: bash -l {0}

    steps:
      # Set up Python to host 'cibuildwheel'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Install 'cibuildwheel' as the driver for building wheels
      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==3.3.0

      # Download the source distribution from above
      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: tblite-python-sdist

      # Build wheels for all supported Python versions
      - name: Build wheels
        run: python -m cibuildwheel --output-dir . *.tar.gz
        env:
          CIBW_PLAT: ${{ contains(matrix.os, 'macos') && '-Dlapack=openblas' || '' }}
          CIBW_CONFIG_SETTINGS: setup-args="-Dtblite:openmp=false"
          # Exclude libgomp from the manylinux wheel so it doesn't collide with
          # another wheel's bundled libgomp (e.g. torch <= 2.6, see #340).
          # libgomp1 is part of gcc-runtime and present on every supported distro.
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: 'auditwheel repair -w {dest_dir} {wheel} --exclude libgomp.so.1'
          CIBW_ARCHS: auto64
          CIBW_ARCHS_MACOS: ${{ matrix.os == 'macos-15' && 'arm64' || 'x86_64' }}
          # MM: Package installation (yum install ...) works differently on musllinux
          CIBW_SKIP: "{cp38-macosx_arm64,cp39-macosx_arm64,*musllinux*}"
          # Include all PyPy versions
          CIBW_ENABLE: pypy pypy-eol
          # Control verbosity of the 'pip wheel' output
          CIBW_BUILD_VERBOSITY: 1
          CIBW_BEFORE_ALL_LINUX: yum install -y lapack-devel
          # Delete all other (=/= gcc-15) GCC versions to avoid conflicts in delocation of the wheel
          # MM: 'openblas' from brew requires gcc@15, using a different version for building leads to delocation errors
          # MM: gcc@14 needs macOS14
          CIBW_BEFORE_ALL_MACOS: |
            brew uninstall gcc@13
            brew uninstall gcc@14
            brew autoremove
            brew install openblas
          # Set macOS variables to find gfortran, lapack, and avoid testing against macOS earlier than 14 (see above)
          CIBW_ENVIRONMENT_MACOS: >
            CC=gcc-15 CXX=g++-15 FC=gfortran-15
            PKG_CONFIG_PATH="$(brew --prefix openblas)/lib/pkgconfig"
            LDFLAGS="-L$(brew --prefix openblas)/lib"
            CPPFLAGS="-I$(brew --prefix openblas)/include"
            MACOSX_DEPLOYMENT_TARGET=15.0
          # Work around duplicate OpenMP runtime loading during import tests on macOS;
          # restrict KMP_DUPLICATE_LIB_OK to the test command so built wheels do not rely on it.
          CIBW_TEST_COMMAND: KMP_DUPLICATE_LIB_OK=TRUE python -c "import tblite.interface"

      # Upload the built wheels as artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: tblite-python-${{ matrix.os }}
          path: ./*.whl
          retention-days: 5

  # Regression test for #340: install the freshly built manylinux wheel
  # together with a torch release known to ship a colliding bundled libgomp
  # (any 2.4 <= torch <= 2.6). The bundled-libgomp pathology breaks SCF
  # non-deterministically; a fixed wheel must converge bit-identically.
  regression-libgomp-collision:
    needs: wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - uses: actions/download-artifact@v4
        with:
          name: tblite-python-ubuntu-latest
      - name: Install built wheel alongside torch 2.6.0+cpu
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./tblite-*cp311*manylinux*.whl numpy \
            'torch==2.6.0+cpu' \
            --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Five identical singlepoints (with torch loaded) must be deterministic or fail loudly
        run: python .github/regressions/test_libgomp_collision.py

  release:
    needs:
      - source
      - sdist
      - wheels
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ github.workspace }}  # This will download all files

      - name: Create SHA256 checksums
        run: |
          set -ex
          for output in tblite*/*tblite*; do
            pushd $(dirname "$output")
            sha256sum $(basename "$output") | tee $(basename "$output").sha256
            popd
          done

      - name: Copy release artifacts
        run: |
          mkdir dist/
          cp -v tblite*/tblite*.whl tblite*/tblite*.tar.gz dist/

      - name: Upload assets
        uses: svenstaro/upload-release-action@v2
        if: ${{ github.event_name == 'release' }}
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: tblite*/*tblite*
          file_glob: true
          tag: ${{ github.ref }}
          overwrite: true


  publish-to-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/')  # only publish to PyPI on tag pushes
    needs:
      - sdist
      - wheels
      - regression-libgomp-collision
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tblite
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - name: Download sdist
      uses: actions/download-artifact@v4
      with:
        name: tblite-python-sdist
        path: dist/

    - name: Download manylinux wheels
      uses: actions/download-artifact@v4
      with:
        name: tblite-python-ubuntu-latest
        path: dist/

    - name: Download osx/aarch64 wheels
      uses: actions/download-artifact@v4
      with:
        name: tblite-python-macos-latest
        path: dist/

    - name: Download osx/x86_64 wheels
      uses: actions/download-artifact@v4
      with:
        name: tblite-python-macos-15-intel
        path: dist/

    - name: Publish distribution to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
